<!DOCTYPE html>
<html>
<head>
    <title>Dashboard SPKLU TOPSIS</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial; margin: 0; }
        .container { padding: 10px; }

        .kpi {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .card {
            flex: 1;
            padding: 10px;
            background: #f4f4f4;
            border-radius: 8px;
            text-align: center;
        }

        #map { height: 400px; margin-bottom: 10px; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Dashboard SPKLU (AHP + TOPSIS)</h2>

    <!-- KPI -->
    <div class="kpi">
        <div class="card">Total SPKLU<br><b id="total"></b></div>
        <div class="card">Optimal<br><b id="optimal"></b></div>
        <div class="card">Evaluasi<br><b id="evaluasi"></b></div>
        <div class="card">Critical<br><b id="critical"></b></div>
    </div>

    <!-- FILTER -->
    <select id="filter">
        <option value="all">Semua</option>
        <option value="Optimal">Optimal</option>
        <option value="Evaluasi">Evaluasi</option>
        <option value="Critical">Critical</option>
    </select>

    <!-- MAP -->
    <div id="map"></div>

    <!-- CHART -->
    <canvas id="chart"></canvas>

    <!-- TABLE -->
    <h3>Ranking TOPSIS</h3>
    <table>
        <thead>
            <tr>
                <th>Ranking</th>
                <th>Nama</th>
                <th>Skor</th>
                <th>Kategori</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
