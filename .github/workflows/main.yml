name: Auto Calculate AHP TOPSIS SPKLU

on:
  schedule:
    - cron: '*/30 * * * *'  # Berjalan setiap 30 menit
  workflow_dispatch:        # Bisa dijalankan manual

permissions:
  contents: write           # Izin wajib untuk push file ke repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas numpy requests

      - name: Run AHP TOPSIS Analysis
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          # Menambahkan file hasil di root directory
          git add data_spklu.json ahp_results.json
          git commit -m "Update hasil perhitungan AHP TOPSIS otomatis" || exit 0
          git push
